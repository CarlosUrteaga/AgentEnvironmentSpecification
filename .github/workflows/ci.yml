name: CI

on:
  push:
  pull_request:

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Syntax
        run: bash -n agent-env tests/run.sh
      - name: Integration tests
        run: ./tests/run.sh
      - name: Validate repository environment
        run: ./agent-env doctor .
